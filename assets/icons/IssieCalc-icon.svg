<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- IssieCalc App Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-500 -500 1620 1620" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">

  <!-- Blue Background -->
  <rect x="-500" y="-500" width="1620" height="1620" fill="#00BCF5"/>

  <!--
    Grid: 2x2, each cell 410x410, gap=30
    Total grid width  = 410+30+410 = 850, centered in 620 (viewBox center=310)
    Left edge  = 310 - 425 = -115
    Right col  = -115 + 410 + 30 = 325
    Top edge   = -200
    Bottom row = -200 + 410 + 30 = 240
    Cell centers:
      TL = (-115+205, -200+205) = (90, 5)
      TR = (325+205, -200+205)  = (530, 5)
      BL = (90, 240+205)        = (90, 445)
      BR = (530, 445)
  -->

  <!-- All 4 cells + symbols — move this group to reposition everything -->
  <g id="calc-grid" transform="translate(20, -30) scale(.9)">

    <!-- Rects -->
    <rect x="-115" y="-200" width="410" height="410" rx="65" ry="65" fill="#FEFFFF"/>
    <rect x="325"  y="-200" width="410" height="410" rx="65" ry="65" fill="#FEFFFF"/>
    <rect x="-115" y="240"  width="410" height="410" rx="65" ry="65" fill="#FEFFFF"/>
    <rect x="325"  y="240"  width="410" height="410" rx="65" ry="65" fill="#FEFFFF"/>

    <!-- + centered at (90, 5) -->
    <g fill="#00BCF5">
      <rect x="-20" y="-24" width="220" height="58" rx="29" ry="29"/>
      <rect x="61"  y="-105" width="58" height="220" rx="29" ry="29"/>
    </g>

    <!-- − centered at (530, 5) -->
    <g fill="#00BCF5">
      <rect x="420" y="-24" width="220" height="58" rx="29" ry="29"/>
    </g>

    <!-- × centered at (90, 445) -->
    <g fill="#00BCF5">
      <rect x="-20" y="416" width="220" height="58" rx="29" ry="29" transform="rotate(45 90 445)"/>
      <rect x="-20" y="416" width="220" height="58" rx="29" ry="29" transform="rotate(-45 90 445)"/>
    </g>

    <!-- = centered at (530, 445) -->
    <g fill="#00BCF5">
      <rect x="420" y="396" width="220" height="54" rx="27" ry="27"/>
      <rect x="420" y="470" width="220" height="54" rx="27" ry="27"/>
    </g>

  </g>

